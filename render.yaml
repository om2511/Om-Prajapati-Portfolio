services:
  - name: om-portfolio-api
    type: web
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm run start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 22.17.0
      - key: HOST
        value: 0.0.0.0
      - key: MONGODB_URI
        sync: false
      - key: CLIENT_ORIGIN
        sync: false

  - name: om-portfolio-frontend
    type: web
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeployTrigger: commit
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 22.17.0
      - key: VITE_API_BASE_URL
        sync: false
